services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
    volumes:
      - ./backend/public/uploads:/usr/share/nginx/html/uploads:ro

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      MONGODB_URI: mongodb://mongo:27017/jewelryDB
      NODE_ENV: production
    depends_on:
      - mongo
    volumes:
      - ./backend/public/uploads:/app/public/uploads

  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: jewelryDB
    volumes:
      - mongodb_data:/data/db

volumes:
  mongodb_data:
